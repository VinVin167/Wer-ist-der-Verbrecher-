name: Temporary TVD Fabric Phase 1 Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Reconstruct and patch source
        shell: bash
        run: |
          cat tvd-build/chunk_*.b64 | base64 --decode > /tmp/tvd-source.zip
          unzip -q /tmp/tvd-source.zip -d /tmp/tvd-source
          python3 - <<'PY'
          from pathlib import Path
          root = Path('/tmp/tvd-source/tvd-fabric-26.2-phase1/src/main/java/de/vincent/tvd')

          p = root / 'vampire/VampireManager.java'
          s = p.read_text()
          s = s.replace('SoundEvents.GENERIC_DRINK,', 'SoundEvents.GENERIC_DRINK.value(),')
          s = s.replace('player.serverLevel().sendParticles(', '((net.minecraft.server.level.ServerLevel) player.level()).sendParticles(')
          s = s.replace('player.displayClientMessage(Component.literal(message).withStyle(formatting), false);', 'player.sendSystemMessage(Component.literal(message).withStyle(formatting));')
          p.write_text(s)

          p = root / 'vampire/VampireEvents.java'
          s = p.read_text()
          s = s.replace('player.displayClientMessage(\n                        net.minecraft.network.chat.Component.literal(', 'player.sendSystemMessage(\n                        net.minecraft.network.chat.Component.literal(')
          s = s.replace('                        ).withStyle(net.minecraft.ChatFormatting.RED),\n                        false\n                );', '                        ).withStyle(net.minecraft.ChatFormatting.RED)\n                );')
          p.write_text(s)

          p = root / 'command/TvdCommands.java'
          s = p.read_text()
          s = s.replace('player.displayClientMessage(Component.literal(message), false);', 'player.sendSystemMessage(Component.literal(message));')
          s = s.replace('player.displayClientMessage(Component.literal("TVD-Status: " + status + time), false);', 'player.sendSystemMessage(Component.literal("TVD-Status: " + status + time));')
          p.write_text(s)
          PY
          test -f /tmp/tvd-source/tvd-fabric-26.2-phase1/build.gradle

      - name: Build Fabric mod
        working-directory: /tmp/tvd-source/tvd-fabric-26.2-phase1
        shell: bash
        run: gradle --no-daemon build --stacktrace > /tmp/tvd-build.log 2>&1

      - name: Upload compiler log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tvd-fabric-compiler-log
          path: /tmp/tvd-build.log
          if-no-files-found: ignore

      - name: Collect playable JAR
        shell: bash
        run: |
          mkdir -p artifact
          cp /tmp/tvd-source/tvd-fabric-26.2-phase1/build/libs/tvd-fabric-0.1.0-phase1.jar artifact/
          jar tf artifact/tvd-fabric-0.1.0-phase1.jar | grep -q fabric.mod.json
          jar tf artifact/tvd-fabric-0.1.0-phase1.jar | grep -q 'de/vincent/tvd/TvdMod.class'
          ls -lh artifact/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: tvd-fabric-26.2-phase1-jar
          path: artifact/tvd-fabric-0.1.0-phase1.jar
          if-no-files-found: error
