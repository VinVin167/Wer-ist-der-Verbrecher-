name: TVD Fabric Phase 3 Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Reconstruct Phase 3 source
        shell: bash
        run: |
          cat tvd-phase3/chunk_*.b64 | base64 --decode > /tmp/tvd-phase3-source.zip
          unzip -q /tmp/tvd-phase3-source.zip -d /tmp/tvd-phase3-source
          PROJECT=/tmp/tvd-phase3-source/tvd-fabric-26.2-phase3
          test -f "$PROJECT/build.gradle"
          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/tvd-phase3-source/tvd-fabric-26.2-phase3/src/main/java/de/vincent/tvd/vampire/FeedingManager.java')
          s = p.read_text()
          s = s.replace('import net.minecraft.world.entity.npc.AbstractVillager;\n', '')
          s = s.replace('''    private static boolean isHumanBloodSource(LivingEntity target) {
                  return target instanceof ServerPlayer || target instanceof AbstractVillager;
              }
          ''', '''    private static boolean isHumanBloodSource(LivingEntity target) {
                  if (target instanceof ServerPlayer) {
                      return true;
                  }
                  var typeId = net.minecraft.core.registries.BuiltInRegistries.ENTITY_TYPE.getKey(target.getType());
                  return typeId != null
                          && ("villager".equals(typeId.getPath()) || "wandering_trader".equals(typeId.getPath()));
              }
          ''')
          p.write_text(s)
          PY

      - name: Build Fabric mod
        working-directory: /tmp/tvd-phase3-source/tvd-fabric-26.2-phase3
        shell: bash
        run: |
          gradle --no-daemon build --stacktrace > /tmp/tvd-phase3-build.log 2>&1 || {
            cat /tmp/tvd-phase3-build.log
            exit 1
          }

      - name: Upload compiler log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tvd-phase3-compiler-log
          path: /tmp/tvd-phase3-build.log
          if-no-files-found: ignore

      - name: Collect playable JAR
        if: success()
        shell: bash
        run: |
          mkdir -p artifact
          cp /tmp/tvd-phase3-source/tvd-fabric-26.2-phase3/build/libs/tvd-fabric-0.3.0-phase3.jar artifact/
          jar tf artifact/tvd-fabric-0.3.0-phase3.jar | grep -q fabric.mod.json
          jar tf artifact/tvd-fabric-0.3.0-phase3.jar | grep -q de/vincent/tvd/vampire/FeedingManager.class

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvd-fabric-26.2-phase3-jar
          path: artifact/tvd-fabric-0.3.0-phase3.jar
          if-no-files-found: error
