name: TVD Fabric Phase 2 Build

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Reconstruct Phase 2 source
        shell: bash
        run: |
          cat tvd-build/chunk_*.b64 | base64 --decode > /tmp/tvd-phase1.zip
          mkdir -p /tmp/tvd-source
          unzip -q /tmp/tvd-phase1.zip -d /tmp/tvd-source
          cat phase2-build/patch_*.b64 | base64 --decode > /tmp/tvd-phase2-overlay.zip
          unzip -qo /tmp/tvd-phase2-overlay.zip -d /tmp/tvd-source
          test -f /tmp/tvd-source/tvd-fabric-26.2-phase1/src/main/java/de/vincent/tvd/vampire/BloodManager.java

      - name: Build Fabric mod
        working-directory: /tmp/tvd-source/tvd-fabric-26.2-phase1
        shell: bash
        run: |
          gradle --no-daemon build --stacktrace > /tmp/tvd-phase2-build.log 2>&1 || {
            tail -n 250 /tmp/tvd-phase2-build.log
            exit 1
          }

      - name: Upload compiler log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tvd-phase2-compiler-log
          path: /tmp/tvd-phase2-build.log
          if-no-files-found: ignore

      - name: Collect playable JAR
        shell: bash
        run: |
          mkdir -p artifact
          cp /tmp/tvd-source/tvd-fabric-26.2-phase1/build/libs/tvd-fabric-0.2.0-phase2.jar artifact/
          jar tf artifact/tvd-fabric-0.2.0-phase2.jar | grep -q fabric.mod.json
          jar tf artifact/tvd-fabric-0.2.0-phase2.jar | grep -q de/vincent/tvd/vampire/BloodManager.class

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: tvd-fabric-26.2-phase2-jar
          path: artifact/tvd-fabric-0.2.0-phase2.jar
          if-no-files-found: error
