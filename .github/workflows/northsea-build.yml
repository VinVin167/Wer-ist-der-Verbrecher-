name: NorthSea Harbor JAR

on:
  push:
    branches:
      - northsea-build-0.5.3
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out temporary build branch
        uses: actions/checkout@v4

      - name: Reconstruct and patch source archive
        shell: bash
        run: |
          set -euo pipefail
          cat northsea-build/source.b64.part* | base64 --decode > /tmp/northsea-source.zip
          unzip -t /tmp/northsea-source.zip
          mkdir -p project
          unzip -q /tmp/northsea-source.zip -d project
          python3 - <<'PY'
          from pathlib import Path

          build = Path('project/build.gradle')
          text = build.read_text(encoding='utf-8')
          cycle = '''sourceSets {
              main {
                  compileClasspath += sourceSets.client.output
                  runtimeClasspath += sourceSets.client.output
              }
          }

          '''
          if cycle not in text:
              raise SystemExit('Expected circular sourceSets block was not found')
          build.write_text(text.replace(cycle, ''), encoding='utf-8')

          runtime = Path('project/src/main/java/dev/vincent/northsea/harbor/runtime/HarborRuntime.java')
          text = runtime.read_text(encoding='utf-8')
          old = 'Path worldRoot = server.getWorldPath(LevelResource.ROOT);\n            String folder = worldRoot.getFileName().toString();'
          new = 'Path worldRoot = server.getWorldPath(LevelResource.ROOT).normalize();\n            String folder = worldRoot.getFileName().toString();'
          if old not in text:
              raise SystemExit('Expected world-root code was not found')
          runtime.write_text(text.replace(old, new), encoding='utf-8')

          activation = Path('project/src/main/java/dev/vincent/northsea/harbor/storage/WorldActivationStore.java')
          text = activation.read_text(encoding='utf-8')
          old = '''        if (selection == null || isExpired(selection)) {
              return false;
          }
          if (selection.worldFolder.equals(worldFolder)) {
              return true;
          }
          if (!selection.enabled || worldRoot == null) {
              return false;
          }
          '''
          new = '''        if (selection == null) {
              return false;
          }
          // An exact save-folder match is durable. Only fuzzy renamed-folder matching expires.
          if (selection.worldFolder.equals(worldFolder)) {
              return true;
          }
          if (isExpired(selection) || !selection.enabled || worldRoot == null) {
              return false;
          }
          '''
          if old not in text:
              raise SystemExit('Expected activation matching code was not found')
          activation.write_text(text.replace(old, new), encoding='utf-8')

          props = Path('project/gradle.properties')
          text = props.read_text(encoding='utf-8')
          if 'mod_version=0.5.3' not in text:
              raise SystemExit('Expected old mod version was not found')
          props.write_text(text.replace('mod_version=0.5.3', 'mod_version=0.5.4'), encoding='utf-8')
          PY

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Build Fabric mod
        working-directory: project
        shell: bash
        run: |
          set -o pipefail
          gradle build -x test --stacktrace --no-daemon 2>&1 | tee /tmp/northsea-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: northsea-build-log-0.5.4
          path: /tmp/northsea-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify generated JAR
        shell: bash
        run: |
          set -euo pipefail
          test -f project/build/libs/northsea-harbor-0.5.4.jar
          unzip -t project/build/libs/northsea-harbor-0.5.4.jar
          unzip -p project/build/libs/northsea-harbor-0.5.4.jar fabric.mod.json | grep '"version": "0.5.4"'
          jar tf project/build/libs/northsea-harbor-0.5.4.jar | grep 'NorthSeaHarborClient.class'
          jar tf project/build/libs/northsea-harbor-0.5.4.jar | grep 'HarborRuntime.class'

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: northsea-harbor-0.5.4
          path: project/build/libs/northsea-harbor-0.5.4.jar
          if-no-files-found: error
          retention-days: 7
