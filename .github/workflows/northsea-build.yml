name: NorthSea Harbor 0.5.6

on:
  push:
    branches:
      - northsea-build-0.5.3
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out temporary build branch
        uses: actions/checkout@v4

      - name: Reconstruct source and apply 0.5.6 patch
        shell: bash
        run: |
          set -euo pipefail
          cat northsea-build/source.b64.part* | base64 --decode > /tmp/northsea-source.zip
          unzip -t /tmp/northsea-source.zip
          mkdir -p project
          unzip -q /tmp/northsea-source.zip -d project

          cat northsea-build/056patch.p00.* northsea-build/056patch.part0[1-7] | base64 --decode > /tmp/northsea-056-patch.zip
          unzip -t /tmp/northsea-056-patch.zip
          unzip -qo /tmp/northsea-056-patch.zip -d project

          python3 - <<'PY'
          from pathlib import Path

          root = Path('project')

          # Minecraft 26.2 moved zombie classes into the monster.zombie package.
          for path in [
              root / 'src/main/java/dev/vincent/northsea/harbor/npc/HarborNpcEntity.java',
              root / 'src/main/java/dev/vincent/northsea/harbor/npc/HarborNpcTypes.java',
          ]:
              text = path.read_text(encoding='utf-8')
              text = text.replace('net.minecraft.world.entity.monster.Zombie',
                                  'net.minecraft.world.entity.monster.zombie.Zombie')
              path.write_text(text, encoding='utf-8')

          # Restore imports that were omitted while splitting the custom-NPC patch.
          imports = {
              root / 'src/main/java/dev/vincent/northsea/harbor/market/MarketService.java': [
                  'import dev.vincent.northsea.harbor.npc.HarborNpcEntity;',
                  'import dev.vincent.northsea.harbor.npc.HarborNpcTypes;',
                  'import dev.vincent.northsea.harbor.world.NpcStyling;',
              ],
              root / 'src/main/java/dev/vincent/northsea/harbor/quest/QuestService.java': [
                  'import dev.vincent.northsea.harbor.npc.HarborNpcEntity;',
                  'import dev.vincent.northsea.harbor.npc.HarborNpcTypes;',
                  'import dev.vincent.northsea.harbor.world.NpcStyling;',
              ],
          }
          for path, needed in imports.items():
              text = path.read_text(encoding='utf-8')
              anchor = 'import dev.vincent.northsea.harbor.NorthSeaHarborMod;\n'
              additions = ''.join(line + '\n' for line in needed if line not in text)
              if additions:
                  text = text.replace(anchor, anchor + additions, 1)
              path.write_text(text, encoding='utf-8')

          # 26.2 groups colored block variants into collections. Keep the detailed city
          # while using the supported collection API and stable decorative substitutes.
          city = root / 'src/main/java/dev/vincent/northsea/harbor/world/CityBlueprint.java'
          text = city.read_text(encoding='utf-8')
          replacements = {
              'Blocks.CUT_COPPER.defaultBlockState()': 'Blocks.GOLD_BLOCK.defaultBlockState()',
              'Blocks.RED_WOOL.defaultBlockState()': 'Blocks.WOOL.red().defaultBlockState()',
              'Blocks.YELLOW_WOOL.defaultBlockState()': 'Blocks.WOOL.yellow().defaultBlockState()',
              'Blocks.BLUE_WOOL.defaultBlockState()': 'Blocks.WOOL.blue().defaultBlockState()',
              'Blocks.GREEN_WOOL.defaultBlockState()': 'Blocks.WOOL.green().defaultBlockState()',
              'Blocks.WHITE_WOOL.defaultBlockState()': 'Blocks.WOOL.white().defaultBlockState()',
              'Blocks.WHITE_TERRACOTTA.defaultBlockState()': 'Blocks.SMOOTH_SANDSTONE.defaultBlockState()',
              'Blocks.LIGHT_GRAY_TERRACOTTA.defaultBlockState()': 'Blocks.POLISHED_ANDESITE.defaultBlockState()',
              'Blocks.YELLOW_TERRACOTTA.defaultBlockState()': 'Blocks.CUT_SANDSTONE.defaultBlockState()',
              'Blocks.CHAIN.defaultBlockState()': 'Blocks.IRON_BARS.defaultBlockState()',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          city.write_text(text, encoding='utf-8')

          grep_targets = [
              root / 'gradle.properties',
              root / 'src/main/java/dev/vincent/northsea/harbor/npc/HarborNpcEntity.java',
              root / 'src/client/java/dev/vincent/northsea/harbor/client/npc/HarborNpcRenderer.java',
          ]
          for path in grep_targets:
              if not path.exists():
                  raise SystemExit(f'Missing required 0.5.6 file: {path}')
          PY

          grep '^mod_version=0.5.6$' project/gradle.properties

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Build Fabric mod
        working-directory: project
        shell: bash
        run: |
          set -o pipefail
          gradle build -x test --stacktrace --no-daemon 2>&1 | tee /tmp/northsea-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: northsea-build-log-0.5.6
          path: /tmp/northsea-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify generated JAR
        shell: bash
        run: |
          set -euo pipefail
          test -f project/build/libs/northsea-harbor-0.5.6.jar
          unzip -t project/build/libs/northsea-harbor-0.5.6.jar
          unzip -p project/build/libs/northsea-harbor-0.5.6.jar fabric.mod.json | grep '"version": "0.5.6"'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'HarborNpcEntity.class'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'HarborNpcRenderer.class'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'textures/entity/npc/banker.png'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'textures/entity/npc/witch.png'

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: northsea-harbor-0.5.6
          path: project/build/libs/northsea-harbor-0.5.6.jar
          if-no-files-found: error
          retention-days: 7
