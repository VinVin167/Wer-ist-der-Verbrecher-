name: NorthSea Harbor JAR

on:
  push:
    branches:
      - northsea-build-0.5.3
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out temporary build branch
        uses: actions/checkout@v4

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat northsea-build/source.b64.part* | base64 --decode > /tmp/northsea-source.zip
          unzip -t /tmp/northsea-source.zip
          mkdir -p project
          unzip -q /tmp/northsea-source.zip -d project

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - name: Build Fabric mod
        working-directory: project
        run: gradle build --stacktrace --no-daemon

      - name: Verify generated JAR
        shell: bash
        run: |
          set -euo pipefail
          test -f project/build/libs/northsea-harbor-0.5.3.jar
          unzip -t project/build/libs/northsea-harbor-0.5.3.jar
          unzip -p project/build/libs/northsea-harbor-0.5.3.jar fabric.mod.json

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: northsea-harbor-0.5.3
          path: project/build/libs/northsea-harbor-0.5.3.jar
          if-no-files-found: error
          retention-days: 7
