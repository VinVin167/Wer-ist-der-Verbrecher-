name: NorthSea Harbor 0.5.6

on:
  push:
    branches:
      - northsea-build-0.5.3
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out temporary build branch
        uses: actions/checkout@v4

      - name: Reconstruct source and apply 0.5.6 patch
        shell: bash
        run: |
          set -euo pipefail
          cat northsea-build/source.b64.part* | base64 --decode > /tmp/northsea-source.zip
          unzip -t /tmp/northsea-source.zip
          mkdir -p project
          unzip -q /tmp/northsea-source.zip -d project

          cat northsea-build/056patch.part* | base64 --decode > /tmp/northsea-056-patch.zip
          unzip -t /tmp/northsea-056-patch.zip
          unzip -qo /tmp/northsea-056-patch.zip -d project

          grep '^mod_version=0.5.6$' project/gradle.properties
          test -f project/src/main/java/dev/vincent/northsea/harbor/npc/HarborNpcEntity.java
          test -f project/src/client/java/dev/vincent/northsea/harbor/client/npc/HarborNpcRenderer.java

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Build Fabric mod
        working-directory: project
        shell: bash
        run: |
          set -o pipefail
          gradle build -x test --stacktrace --no-daemon 2>&1 | tee /tmp/northsea-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: northsea-build-log-0.5.6
          path: /tmp/northsea-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify generated JAR
        shell: bash
        run: |
          set -euo pipefail
          test -f project/build/libs/northsea-harbor-0.5.6.jar
          unzip -t project/build/libs/northsea-harbor-0.5.6.jar
          unzip -p project/build/libs/northsea-harbor-0.5.6.jar fabric.mod.json | grep '"version": "0.5.6"'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'HarborNpcEntity.class'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'HarborNpcRenderer.class'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'textures/entity/npc/banker.png'
          jar tf project/build/libs/northsea-harbor-0.5.6.jar | grep 'textures/entity/npc/witch.png'

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: northsea-harbor-0.5.6
          path: project/build/libs/northsea-harbor-0.5.6.jar
          if-no-files-found: error
          retention-days: 7
