name: TVD Fabric Phase 1 Build

on:
  push:
    branches:
      - temp-tvd-fabric-build-20260714
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Reconstruct source archive
        shell: bash
        run: |
          cat tvd-build/chunk_*.b64 | base64 --decode > /tmp/tvd-source.zip
          unzip -q /tmp/tvd-source.zip -d /tmp/tvd-source
          test -f /tmp/tvd-source/tvd-fabric-26.2-phase1/build.gradle

      - name: Build Fabric mod
        working-directory: /tmp/tvd-source/tvd-fabric-26.2-phase1
        run: gradle --no-daemon build --stacktrace

      - name: Collect playable JAR
        shell: bash
        run: |
          mkdir -p artifact
          cp /tmp/tvd-source/tvd-fabric-26.2-phase1/build/libs/tvd-fabric-0.1.0-phase1.jar artifact/
          jar tf artifact/tvd-fabric-0.1.0-phase1.jar | grep -q fabric.mod.json
          ls -lh artifact/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: tvd-fabric-26.2-phase1-jar
          path: artifact/tvd-fabric-0.1.0-phase1.jar
          if-no-files-found: error
